apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm_w_cicd.fullname" . }}-web
data:
  index.html: |
    <html>
      <head><title>{{ .Values.ui.title }}</title></head>
      <body style="font-family: Arial; margin: 40px;">
        <h1>{{ .Values.ui.heading }}</h1>
        <p>{{ .Values.ui.message }}</p>
        <hr/>
        <p style="color:#888;font-size:12px;">Chart: {{ .Chart.Name }} v{{ .Chart.Version }} | App: {{ .Chart.AppVersion }}</p>
      </body>
    </html>